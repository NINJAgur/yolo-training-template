# docker-compose.yml — Ukraine Combat Footage Web Application
#
# PHASE 0/1/2/3: Only postgres and redis services are active.
# Uncomment application services as each phase is completed.
#
# PHASE 4: All services active. ml-engine uses NVIDIA Container Toolkit.
# Requires: Docker Desktop with WSL2 backend + NVIDIA Container Toolkit installed.

services:

  # ── Infrastructure Services (active from Phase 0) ──────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ukraine_footage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ukraine_footage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

